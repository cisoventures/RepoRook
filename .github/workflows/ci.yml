name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  unit:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: [20, 22]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci --ignore-scripts
      - run: npm run check

  fixture:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          fetch-depth: 0
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci --ignore-scripts
      - run: npm run build
      - run: npm run fixture:prepare
      - run: ./action/install-scanners.sh
      - name: Confirm fixture is blocked with complete coverage
        shell: bash
        run: |
          set +e
          node cli/dist/index.js scan test-fixtures/vulnerable-app --require-scanners --fail-on high
          code=$?
          set -e
          test "$code" -eq 1
          node -e "const r=require('./test-fixtures/vulnerable-app/.reporook/findings.json'); if(r.coverage_status!=='complete'||r.summary.total<3) process.exit(1)"
      - name: Confirm verification preserves the baseline
        run: npm run fixture:verify
