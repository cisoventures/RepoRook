name: Release artifacts

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci --ignore-scripts
      - run: npm run check
      - name: Pack npm distributions
        run: |
          mkdir release
          npm pack --workspace reporook --pack-destination release
          npm pack --workspace @reporook/mcp-server --pack-destination release
      - name: Archive native adapters
        run: tar -czf release/reporook-adapters-${GITHUB_REF_NAME}.tar.gz adapters
      - uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3
        with:
          files: release/*
