name: Release artifacts

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci --ignore-scripts
      - run: npm run check
      - name: Pack npm distributions
        run: |
          mkdir release
          npm pack --workspace reporook --pack-destination release
          npm pack --workspace @reporook/mcp-server --pack-destination release
      - name: Archive native adapters
        run: tar -czf release/reporook-adapters-${GITHUB_REF_NAME}.tar.gz adapters
      - uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          files: release/*
