name: Release artifacts

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci --ignore-scripts
      - run: npm run check
      - name: Pack npm distributions
        run: |
          mkdir release
          npm pack --workspace reporook --pack-destination release
          npm pack --workspace @reporook/mcp-server --pack-destination release
      - name: Archive native adapters
        run: tar -czf release/reporook-adapters-${GITHUB_REF_NAME}.tar.gz adapters
      - uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          files: release/*
