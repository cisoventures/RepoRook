name: Release artifacts

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          package-manager-cache: false
      - run: npm install --global --ignore-scripts npm@11.18.0
      - run: npm ci --ignore-scripts
      - run: npm run check
      - name: Confirm tag and package versions agree
        shell: bash
        run: |
          version="${GITHUB_REF_NAME#v}"
          test "$version" = "$(node -p "require('./cli/package.json').version")"
          test "$version" = "$(node -p "require('./mcp-server/package.json').version")"
      - name: Pack npm distributions
        run: |
          mkdir release
          npm pack --workspace reporook --pack-destination release
          npm pack --workspace @reporook/mcp-server --pack-destination release
      - name: Install and execute packed distributions
        run: node scripts/smoke-packages.mjs release
      - name: Publish npm distributions with provenance
        shell: bash
        run: |
          version="${GITHUB_REF_NAME#v}"
          npm publish "release/reporook-${version}.tgz" --access public --provenance
          npm publish "release/reporook-mcp-server-${version}.tgz" --access public --provenance
      - name: Archive native adapters
        run: tar -czf release/reporook-adapters-${GITHUB_REF_NAME}.tar.gz adapters
      - uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3
        with:
          files: release/*
