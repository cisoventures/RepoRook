name: Release artifacts

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci --ignore-scripts
      - run: npm run check
      - name: Pack npm distributions
        run: |
          mkdir release
          npm pack --workspace reporook --pack-destination release
          npm pack --workspace @reporook/mcp-server --pack-destination release
      - name: Archive native adapters
        run: tar -czf release/reporook-adapters-${GITHUB_REF_NAME}.tar.gz adapters
      - uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          files: release/*
